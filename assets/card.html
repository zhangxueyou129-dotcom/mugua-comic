<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>木瓜漫画 地址卡片</title>
<style>
  body {
    margin: 0; padding: 40px;
    background: #0c1117;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  .card {
    width: 600px;
    background: linear-gradient(160deg, #161b22, #0c1117);
    border: 1px solid #21262d;
    border-radius: 24px;
    padding: 48px 40px;
    color: #fff;
  }
  .header { text-align: center; margin-bottom: 36px; }
  .logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #ff9800, #ff5722);
    border-radius: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 12px;
    box-shadow: 0 6px 24px rgba(255,152,0,0.25);
  }
  .header h1 { font-size: 28px; margin: 0 0 4px; }
  .header p { color: #8b949e; font-size: 14px; margin: 0; }
  .section { margin-bottom: 28px; }
  .section h2 {
    font-size: 13px; color: #ff9800;
    text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 14px;
    border-bottom: 1px solid #21262d;
    padding-bottom: 8px;
  }
  .entry {
    background: rgba(255,255,255,0.04);
    border: 1px solid #21262d;
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 8px;
  }
  .entry .label { color: #8b949e; font-size: 12px; }
  .entry .value { color: #fff; font-size: 18px; font-weight: 600; margin-top: 2px; }
  .tg-entry .value { color: #58a6ff; }
  .footer {
    text-align: center;
    color: #484f58; font-size: 12px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #21262d;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="logo">🍈</div>
    <h1>木瓜漫画</h1>
    <p>官方地址卡片 · 2026-04-09</p>
  </div>

  <div class="section">
    <h2>网站入口</h2>
    <div class="entry">
      <div class="label">主线路</div>
      <div class="value">comic.baby</div>
    </div>
  </div>

  <div class="section">
    <h2>Telegram 频道</h2>
    <div class="entry tg-entry">
      <div class="label">关注频道获取最新地址</div>
      <div class="value">t.me/papayacomic</div>
    </div>
  </div>

  <div class="section">
    <h2>地址找回</h2>
    <div class="entry">
      <div class="label">GitHub 发布页（永不失效）</div>
      <div class="value" style="font-size:14px;">github.com/skillerbee7/mugua-comic</div>
    </div>
  </div>

  <div class="footer">
    本卡片为木瓜漫画官方发布 · 请勿相信其他来源
  </div>
</div>

</body>
</html>
