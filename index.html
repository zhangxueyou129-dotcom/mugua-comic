<style>
  :root {
    --bg: #0c1117;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

    background: var(--bg);

  body::before {

    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: 48px 20px 40px;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .logo-wrap {
    width: 88px; height: 88px;
    background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%);
    border-radius: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 44px;
    margin-bottom: 16px;

  @keyframes float {

  .header h1 {

    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .header .tagline {
    color: var(--text2);

    margin-top: 6px;

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;

  .route {

  .route:last-child { margin-bottom: 0; }
  .route:hover {

    border-color: rgba(255,152,0,0.3);
    transform: translateX(2px);

  .route:active { transform: scale(0.99); }
  .route .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 14px;
    flex-shrink: 0;
    box-shadow: 0 0 8px rgba(63,185,80,0.4);
  }
  .route .dot.offline {
    background: var(--text3);
    box-shadow: none;
  }
  .route .info { flex: 1; }
  .route .name {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .route .domain {
    font-size: 12px;
    color: var(--text2);
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .route .go {
    color: var(--accent);
    font-size: 20px;
    font-weight: 300;
    margin-left: 8px;
    transition: transform 0.2s;
  }
  .route:hover .go { transform: translateX(3px); }

  .dl-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .dl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 12px;
    border-radius: 10px;
    text-decoration: none;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    gap: 6px;
  }
  .dl-btn .dl-icon { font-size: 22px; }
  .dl-btn:hover { transform: translateY(-2px); }
  .dl-btn:active { transform: scale(0.97); }
  .dl-android {

  .dl-ios {

  .dl-note {

  .tg-link {

  .tg-link:active { transform: scale(0.98); }
  .tg-link svg { width: 20px; height: 20px; fill: #fff; }

  .notice {

    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .notice p {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
  }
  .notice .warn-icon {

  .footer {

  .footer .update {

    margin-bottom: 4px;
  }
  .footer .copy {
    font-size: 11px;
    color: var(--text3);
  }

  @media (max-width: 360px) {
    .container { padding: 32px 14px 32px; }
    .dl-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
